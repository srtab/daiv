site_name: DAIV
site_url: https://srtab.github.io/daiv/
repo_url: https://github.com/srtab/daiv
site_description: Documentation for DAIV
site_author: Sandro Rodrigues
strict: true
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/robot-outline

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - search.highlight
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - content.code.annotate
    - content.code.copy
    - content.action.edit

  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - attr_list
  - admonition
  - tables
  - md_in_html
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Deployment: getting-started/deployment.md
    - Platform Setup: getting-started/platform-setup.md
    - LLM Providers: getting-started/llm-providers.md
  - Features:
    - Issue Addressing: features/issue-addressing.md
    - Pull Request Assistant: features/pull-request-assistant.md
    - Slash Commands & Skills: features/slash-commands.md
    - Subagents: features/subagents.md
    - Sandbox: features/sandbox.md
  - Customization:
    - Repository Config: customization/repository-config.md
    - Agent Skills: customization/agent-skills.md
    - MCP Tools: customization/mcp-tools.md
  - Reference:
    - Environment Variables: reference/env-variables.md
    - Agent Architecture: reference/agent-architecture.md
    - Monitoring: reference/monitoring.md
  - Community: community.md
