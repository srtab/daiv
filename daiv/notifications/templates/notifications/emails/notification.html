{% load i18n %}
<!DOCTYPE html>
<html>
<body style="font-family: -apple-system, sans-serif; color: #111; max-width: 560px; margin: 0 auto; padding: 24px;">
  <h2 style="margin: 0 0 16px 0;">{{ notification.subject }}</h2>
  <p style="line-height: 1.6; white-space: pre-wrap;">{{ notification.body }}</p>
  {% if notification.link_url %}
    <p style="margin-top: 24px;">
      <a href="{{ link_absolute_url }}"
         style="background: #030712; color: #fff; padding: 10px 16px; text-decoration: none; border-radius: 8px; display: inline-block;">
        {% translate "View details" %}
      </a>
    </p>
  {% endif %}
  <hr style="border: none; border-top: 1px solid #eee; margin: 32px 0 16px;">
  <p style="color: #888; font-size: 12px;">DAIV</p>
</body>
</html>
