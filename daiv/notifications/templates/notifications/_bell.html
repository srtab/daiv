{% load i18n %}
<div id="notifications-bell" class="relative"
     hx-get="{% url 'notifications:bell_badge' %}"
     hx-trigger="load, every 60s [document.visibilityState === 'visible']"
     hx-swap="outerHTML"
     x-data="{ open: false }">
  <button type="button" @click="open = !open"
          hx-get="{% url 'notifications:bell_dropdown' %}"
          hx-target="#notifications-dropdown"
          hx-swap="innerHTML"
          class="relative flex h-9 w-9 items-center justify-center rounded-lg hover:bg-white/[0.05]"
          aria-label="{% translate 'Notifications' %}">
    <!-- Bell icon (outline) -->
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
    </svg>
    {% if unread_count %}
      <span class="absolute -top-1 -right-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-emerald-500 px-1 text-[10px] font-semibold text-white">
        {{ unread_count }}
      </span>
    {% endif %}
  </button>

  <div x-show="open" @click.outside="open = false" x-transition
       class="absolute right-0 z-50 mt-2 w-80 overflow-hidden rounded-xl border border-white/[0.06] bg-[#0a0e1a] shadow-xl">
    <div id="notifications-dropdown" class="max-h-96 overflow-y-auto">
      <!-- HTMX populates on open -->
      <p class="px-4 py-6 text-center text-xs text-gray-500">{% translate "Loading…" %}</p>
    </div>
  </div>
</div>
