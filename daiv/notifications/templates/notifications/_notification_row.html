{% load i18n %}
<a href="{{ notification.link_url }}"
   hx-post="{% url 'notifications:mark_read' notification.id %}"
   hx-swap="outerHTML"
   class="block border-b border-white/[0.06] px-4 py-3 transition hover:bg-white/[0.03] last:border-b-0 {% if not notification.read_at %}bg-white/[0.02]{% endif %}">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-medium text-white">{{ notification.subject }}</p>
      <p class="mt-0.5 line-clamp-2 text-xs text-gray-400">{{ notification.body }}</p>
    </div>
    {% if not notification.read_at %}
      <span class="mt-1 h-2 w-2 flex-shrink-0 rounded-full bg-emerald-400"></span>
    {% endif %}
  </div>
  <div class="mt-1 flex items-center gap-2 text-[11px] text-gray-500">
    <span>{{ notification.created_at|timesince }} {% translate "ago" %}</span>
    {% for d in notification.deliveries.all %}
      <span class="rounded-full px-1.5 py-0.5
        {% if d.status == 'sent' %}bg-emerald-500/10 text-emerald-400
        {% elif d.status == 'failed' %}bg-red-500/10 text-red-400
        {% elif d.status == 'skipped' %}bg-gray-500/10 text-gray-400
        {% else %}bg-amber-500/10 text-amber-400{% endif %}">
        {{ d.channel_type }}: {{ d.get_status_display }}
      </span>
    {% endfor %}
  </div>
</a>
