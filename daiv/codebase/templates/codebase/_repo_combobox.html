<div x-combobox x-model="selected" {% if combobox_name %}name="{{ combobox_name }}"{% endif %} nullable>
    <div class="relative">
        <input type="text" x-combobox:input
               :display-value="v => v || ''"
               @input="search($event.target.value)"
               placeholder="Search repository..."
               autocomplete="off">
        <button x-show="selected" x-cloak type="button"
                @click="selected = null"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-300">
            <svg class="combobox-icon h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
            </svg>
        </button>
        <svg x-show="isLoading && !selected" x-cloak class="combobox-icon absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 animate-spin text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </div>
    <div x-combobox:options x-cloak
         class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-xl border border-white/[0.06] bg-[#0d1117] shadow-lg">
        <ul>
            <template x-for="repo in results" :key="repo.slug" hidden>
                <li x-combobox:option :value="repo.slug"
                    class="combobox-option cursor-pointer px-3 py-2 text-[14px]"
                    :class="$comboboxOption.isActive ? 'bg-white/[0.08] text-white' : 'text-gray-300 hover:bg-white/[0.06]'">
                    <span x-text="repo.slug"></span>
                    <span x-show="repo.name !== repo.slug" x-text="'— ' + repo.name" class="ml-1 text-gray-400"></span>
                </li>
            </template>
        </ul>
        <p x-show="results.length === 0 && !isLoading" class="combobox-option px-3 py-2 text-[14px] text-gray-400">No repositories found.</p>
    </div>
</div>
