{% load i18n %}
<div id="user-envs" class="mt-3"
     hx-get="{% url 'sandbox_envs:list' %}"
     hx-trigger="env-created from:body, env-updated from:body"
     hx-select="#user-envs"
     hx-target="this"
     hx-swap="outerHTML">
    {% if user_envs %}
    <div class="rounded-2xl border border-white/[0.06] divide-y divide-white/[0.06]">
        {% for env in user_envs %}
        <div class="flex items-center justify-between px-4 py-3">
            <div>
                <strong>{{ env.name }}</strong>
                <span class="text-sm text-gray-400">{{ env.base_image }}</span>
            </div>
            <div class="flex items-center gap-3">
                <a href="{% url 'sandbox_envs:edit' env.id %}"
                   @click.prevent="window.dispatchEvent(new CustomEvent('open-env-drawer', {detail: {mode: 'edit', url: '{% url 'sandbox_envs:edit' env.id %}'}}))"
                   class="text-sm text-gray-300 hover:text-white">
                    {% translate "Edit" %}
                </a>
                <a href="{% url 'sandbox_envs:delete' env.id %}" class="text-sm text-red-300 hover:text-red-200">
                    {% translate "Delete" %}
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 text-center">
        <p class="text-[15px] text-gray-400">{% translate "No personal environments yet." %}</p>
    </div>
    {% endif %}
</div>
