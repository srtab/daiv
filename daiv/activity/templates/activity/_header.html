{% load activity_tags humanize %}
<div class="animate-fade-up">
    <h1 class="text-2xl font-bold tracking-tight text-white">{% activity_title activity %}</h1>
    <p class="mt-1.5 text-[15px] font-light text-gray-400">
        {{ activity.get_trigger_type_display }}
        {% if activity.user or activity.external_username %}
            &middot; started by <span class="text-gray-300">{{ activity.user|default:activity.external_username }}</span>
        {% endif %}
        &middot; {{ activity.created_at|naturaltime }}
    </p>
</div>
