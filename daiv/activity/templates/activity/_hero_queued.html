<div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6">
    <div class="flex items-center justify-between gap-3">
        <h2 class="text-[15px] font-semibold text-gray-300">Result</h2>
        <div class="flex items-center gap-2 opacity-40">
            <span class="btn-secondary rounded-lg px-3 py-1.5 text-sm" aria-disabled="true">Copy</span>
            <span class="btn-secondary rounded-lg px-3 py-1.5 text-sm" aria-disabled="true">Markdown</span>
        </div>
    </div>
