<div class="rounded-xl border border-white/[0.04] bg-white/[0.01] px-4 py-4">
    <div class="flex items-center justify-between">
        <label for="id_{{ field.name }}" class="flex items-center gap-1.5 text-[14px] font-medium text-gray-400">
            <svg class="h-3 w-3 text-amber-500/60" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z"/>
            </svg>
            {{ field.label }}
            {% if field.field.is_env_locked %}
            {% include "core/_env_lock_badge.html" %}
            {% endif %}
        </label>
        {% if field.field.secret_hint and not field.field.is_env_locked %}
        <button type="submit" name="clear_{{ field.name }}" value="1"
                class="rounded-lg border border-white/[0.06] bg-white/[0.03] px-2.5 py-1 text-[12px] font-medium text-gray-500 transition-all duration-200 hover:border-red-800/50 hover:bg-red-950/30 hover:text-red-300">
            Clear
        </button>
        {% endif %}
    </div>
    <div class="mt-2">
        {% if field.field.is_env_locked %}
        <input type="password" disabled value="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
        {% else %}
        {{ field }}
        {% endif %}
    </div>
    {% if field.field.secret_hint %}
    <p class="mt-1.5 text-[13px] text-gray-600">Current: <code class="text-gray-500">{{ field.field.secret_hint }}</code></p>
    {% endif %}
    {% if field.help_text %}
    <p class="mt-1.5 text-[13px] text-gray-500">{{ field.help_text }}</p>
    {% endif %}
</div>
