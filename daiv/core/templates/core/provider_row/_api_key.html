{% load i18n %}
<div>
  <div class="flex items-center justify-between">
    <label class="block text-[12px] uppercase tracking-wide text-gray-500" for="id_{{ row.api_key.html_name }}">{% translate "API key" %}</label>
    {% if row.fields.api_key.secret_hint %}
    <input type="hidden" name="{{ row.clear_api_key.html_name }}" value="">
    <button type="button"
            @click="document.getElementsByName('{{ row.clear_api_key.html_name }}')[0].value = 'on'; $el.form.submit()"
            class="rounded border border-white/[0.06] bg-white/[0.03] px-2 py-0.5 text-[11px] font-medium text-gray-400 transition-colors hover:border-red-800/50 hover:bg-red-950/30 hover:text-red-300">
      {% translate "Clear" %}
    </button>
    {% endif %}
  </div>
  {{ row.api_key }}
  {% if row.fields.api_key.secret_hint %}
  <p class="mt-1 text-[11px] text-gray-500">{% translate "Stored:" %} <code class="font-mono">{{ row.fields.api_key.secret_hint }}</code></p>
  {% endif %}
  {% if row.errors.api_key %}<p class="mt-1 text-xs text-red-300">{{ row.errors.api_key.0 }}</p>{% endif %}
</div>
