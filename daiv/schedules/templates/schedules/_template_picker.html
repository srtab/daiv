{% if not object and schedule_templates %}
{{ schedule_templates|json_script:"schedule-templates-data" }}
<div class="mb-6 rounded-xl border border-white/[0.06] bg-white/[0.02] p-4"
     x-data="{
         templates: JSON.parse(document.getElementById('schedule-templates-data').textContent),
         selected: '{{ selected_template_id|default:'' }}',
         lastSelected: '{{ selected_template_id|default:'' }}',
         get description() {
             const t = this.templates.find(x => String(x.id) === String(this.selected));
             return t ? t.description : '';
         },
         onChange(ev) {
             const newVal = ev.target.value;
             if (window.__scheduleFormDirty) {
                 if (!window.confirm('Discard your current changes and apply this template?')) {
                     ev.target.value = this.lastSelected;
                     this.selected = this.lastSelected;
                     return;
                 }
             }
             this.lastSelected = newVal;
             const params = new URLSearchParams(window.location.search);
             if (newVal) { params.set('template', newVal); } else { params.delete('template'); }
             window.location.search = params.toString();
         }
     }">
    <label for="id_template_picker" class="block text-[15px] font-medium text-gray-400">Start from template</label>
    <select id="id_template_picker" x-model="selected" @change="onChange($event)" class="mt-2">
        <option value="">Blank schedule</option>
        {% for tpl in schedule_templates %}
        <option value="{{ tpl.id }}" {% if selected_template_id == tpl.id|stringformat:"s" %}selected{% endif %}>{{ tpl.name }}</option>
        {% endfor %}
    </select>
    <p class="mt-2 text-sm text-gray-400" x-text="description" x-show="description" x-cloak></p>
</div>
{% endif %}
