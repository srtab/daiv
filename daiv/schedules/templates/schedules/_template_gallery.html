{% load i18n %}
{% if schedule_templates %}
{{ schedule_templates|json_script:"schedule-templates-data" }}
<div x-data="templateGallery({ confirmMessage: '{% translate "Discard your current changes and apply this template?"|escapejs %}' })"
     @open-template-gallery.window="open = true"
     @keydown.escape.window="if (open) close()"
     x-show="open"
     x-cloak
     class="fixed inset-0 z-30">
    <div x-show="open" x-transition.opacity
         @click="close()"
         class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"></div>

    <aside x-show="open"
           x-transition:enter="transition duration-200 ease-out"
           x-transition:enter-start="translate-x-full"
           x-transition:enter-end="translate-x-0"
           x-transition:leave="transition duration-150 ease-in"
           x-transition:leave-start="translate-x-0"
           x-transition:leave-end="translate-x-full"
           role="dialog" aria-modal="true"
           class="absolute inset-y-0 right-0 flex w-full max-w-xl flex-col border-l border-white/[0.06] bg-[#0d1117] shadow-2xl">

        <header class="flex items-start justify-between gap-4 border-b border-white/[0.06] px-6 py-4">
            <div>
                <h2 class="text-lg font-semibold text-white">{% translate "Start from template" %}</h2>
                <p class="mt-1 text-sm text-gray-400">{% translate "Pick a ready-made schedule. Every field stays editable after." %}</p>
            </div>
            <button type="button" @click="close()" aria-label="{% translate 'Close' %}"
                    class="rounded-lg p-2 text-gray-400 hover:bg-white/[0.06] hover:text-white">
                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
            </button>
        </header>

        <div class="px-6 pt-4">
            <input type="text" x-model="query"
                   placeholder="{% translate 'Search templates…' %}" autocomplete="off"
                   class="w-full">
        </div>

        <div class="mt-4 flex-1 space-y-3 overflow-y-auto px-6 pb-6">
            <template x-for="tpl in filtered" :key="tpl.id">
                <article class="flex items-start gap-3 rounded-xl border border-white/[0.06] bg-white/[0.02] p-4 transition hover:border-white/[0.12]">
                    <div class="min-w-0 flex-1">
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="font-medium text-white" x-text="tpl.name"></span>
                            <template x-if="tpl.use_max">
                                <span class="rounded-full bg-amber-900/40 px-2 py-0.5 text-[11px] font-medium text-amber-300">{% translate "max" %}</span>
                            </template>
                        </div>
                        <p class="mt-1.5 whitespace-pre-wrap text-sm text-gray-300" x-text="tpl.description"></p>
                        <div class="mt-2 flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-gray-500">
                            <span x-text="tpl.frequency_summary"></span>
                            <span>·</span>
                            <span x-text="tpl.repos_summary"></span>
                            <span>·</span>
                            <span x-text="tpl.notify_on_display"></span>
                        </div>
                    </div>
                    <a :href="`{% url 'schedule_create' %}?template=${tpl.id}`"
                       @click="confirmApply($event)"
                       class="btn-secondary inline-flex shrink-0 items-center gap-1 self-center text-sm">
                        {% translate "Use" %}
                        <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/></svg>
                    </a>
                </article>
            </template>

            <p x-show="filtered.length === 0" class="py-10 text-center text-sm text-gray-500">
                {% translate "No templates match your search." %}
            </p>
        </div>
    </aside>
</div>
{% endif %}
