{% load i18n %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60"
     @keydown.escape.window="$dispatch('close-skills-modal')"
     @click.self="$dispatch('close-skills-modal')">
    <div class="w-full max-w-md rounded-2xl border border-white/[0.06] bg-[#0c0f1a] p-6">
        <h2 class="text-lg font-semibold">{% translate "Upload skill" %}</h2>
        <p class="mt-1 text-sm text-gray-400">
            {% translate "Upload a zip archive containing a single skill directory with a SKILL.md at its root." %}
        </p>
        <form method="post"
              enctype="multipart/form-data"
              action="{% url 'skills:upload' %}"
              hx-post="{% url 'skills:upload' %}"
              hx-encoding="multipart/form-data"
              hx-target="#skills-modal-host"
              hx-swap="innerHTML"
              class="mt-4 space-y-4">
            {% csrf_token %}
            <div>
                <input type="file"
                       name="zip"
                       accept=".zip,application/zip"
                       required
                       class="block w-full text-sm text-gray-300 file:mr-3 file:rounded-md file:border-0 file:bg-violet-600 file:px-3 file:py-1.5 file:text-sm file:font-medium file:text-white hover:file:bg-violet-500">
                {% if form.zip.errors %}
                <p class="mt-2 text-sm text-red-300">{{ form.zip.errors|join:" " }}</p>
                {% endif %}
            </div>
            <input type="hidden" name="force" value="">
            <div class="flex items-center justify-end gap-3">
                <button type="button"
                        class="btn-secondary"
                        @click="$dispatch('close-skills-modal')">
                    {% translate "Cancel" %}
                </button>
                <button type="submit" class="btn-primary">{% translate "Upload" %}</button>
            </div>
        </form>
    </div>
</div>
