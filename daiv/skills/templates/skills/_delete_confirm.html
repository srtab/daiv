{% load i18n %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60"
     @keydown.escape.window="$dispatch('close-skills-modal')"
     @click.self="$dispatch('close-skills-modal')">
    <div class="w-full max-w-md rounded-2xl border border-red-800/50 bg-[#0c0f1a] p-6">
        <h2 class="text-lg font-semibold">{% translate "Delete skill" %}</h2>
        <p class="mt-2 text-red-200">
            {% blocktranslate with name=skill.name %}Delete skill "{{ name }}"?{% endblocktranslate %}
        </p>
        <p class="mt-2 text-sm text-gray-400">
            {% translate "The skill is moved to a recycle bin for 24 hours before being permanently removed." %}
        </p>
        <form hx-post="{% url 'skills:delete' skill.name %}"
              hx-target="#skills-modal-host"
              hx-swap="innerHTML"
              class="mt-4">
            {% csrf_token %}
            <div class="flex items-center justify-end gap-3">
                <button type="button"
                        class="btn-secondary"
                        @click="$dispatch('close-skills-modal')">
                    {% translate "Cancel" %}
                </button>
                <button type="submit" class="btn-danger">{% translate "Delete" %}</button>
            </div>
        </form>
    </div>
</div>
