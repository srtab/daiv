{% load i18n %}
<div class="mt-3">
    {% if builtin_skills %}
    <div class="rounded-2xl border border-white/[0.06] divide-y divide-white/[0.06]">
        {% for skill in builtin_skills %}
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex-1">
                <p class="font-semibold">{{ skill.name }}</p>
                <p class="text-sm text-gray-400">{{ skill.description }}</p>
            </div>
            <span class="inline-flex items-center rounded-md bg-gray-800/50 px-2 py-0.5 text-xs text-gray-400">
                {% translate "Built-in" %}
            </span>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 text-center">
        <p class="text-[15px] text-gray-400">{% translate "No built-in skills shipped." %}</p>
    </div>
    {% endif %}
</div>
