{# daiv/chat/templates/chat/_filter_bar.html #}
{% load i18n %}
<form id="chat-filter-form"
      hx-get="{% url 'chat_list' %}"
      hx-target="#workspace-list"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-trigger="input changed delay:250ms from:input[name='q'], change"
      class="space-y-1.5">
  <div class="flex items-center gap-1.5">
    <input type="search" name="q" value="{{ request.GET.q|default:'' }}"
           placeholder="{% trans 'Search…' %}"
           class="min-w-0 flex-1 rounded-md border border-white/[0.08] bg-white/[0.02] px-3 py-1.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-violet-500">
    <a href="{% url 'chat_new' %}"
       class="shrink-0 inline-flex h-8 w-8 items-center justify-center rounded-md border border-white/[0.08] text-gray-400 transition-colors hover:border-violet-500 hover:text-violet-400"
       aria-label="{% trans 'New chat' %}">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>

  <div class="flex items-center gap-2 text-xs">
    <select name="repo_id"
            class="rounded-md border border-white/[0.08] bg-white/[0.02] px-2 py-1 text-gray-300">
      <option value="">{% trans "All repos" %}</option>
      {% for repo in available_repos %}
      <option value="{{ repo }}" {% if request.GET.repo_id == repo %}selected{% endif %}>{{ repo }}</option>
      {% endfor %}
    </select>

    <div class="inline-flex rounded-md border border-white/[0.08] bg-white/[0.02] p-0.5"
         role="radiogroup" aria-label="{% trans 'Status' %}">
      {% for value, label in status_choices %}
      <label class="cursor-pointer px-2 py-1 rounded
                    {% if request.GET.status|default:'' == value %}bg-violet-500/30 text-white{% else %}text-gray-400{% endif %}">
        <input type="radio" name="status" value="{{ value }}"
               {% if request.GET.status|default:'' == value %}checked{% endif %}
               class="sr-only">{{ label }}
      </label>
      {% endfor %}
    </div>

    {% if request.user.is_admin %}
    <label class="ml-auto inline-flex items-center gap-1.5 text-gray-400">
      <input type="checkbox" name="all" value="1" {% if request.GET.all == "1" %}checked{% endif %}
             class="h-3.5 w-3.5 rounded border-white/20 bg-transparent text-violet-500">
      <span>{% trans "All users" %}</span>
    </label>
    {% endif %}
  </div>
</form>
