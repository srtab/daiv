{% load i18n %}
<form @submit.prevent="submit()"
      class="chat-composer"
      :class="{ 'chat-composer--sending': streaming }">

  <button type="button"
          class="chat-jump"
          x-show="showJumpToLatest"
          @click="scrollToBottom({force: true})"
          x-transition.opacity>↓ {% trans "Jump to latest" %}</button>

  <div class="chat-composer__meta">
    <template x-if="thread">
      <span class="chat-composer__chip">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
        </svg>
        <span x-text="thread.repo_id"></span>
        <span class="chat-composer__chip-sep">/</span>
        <span class="chat-composer__chip-ref" x-text="thread.ref"></span>
      </span>
    </template>

    <template x-if="!thread">
      <span class="chat-composer__chip-inputs">
        <input type="text" x-model="draftRepoId"
               placeholder="{% trans 'owner/repo' %}"
               class="chat-composer__chip-input">
        <span class="chat-composer__chip-sep">/</span>
        <input type="text" x-model="draftRef" placeholder="main"
               class="chat-composer__chip-input chat-composer__chip-input--ref">
      </span>
    </template>
  </div>

  <label for="chat_prompt" class="sr-only">{% trans "Message DAIV" %}</label>
  <textarea id="chat_prompt"
            x-ref="prompt"
            x-model="draftMessage"
            @input="autosize()"
            @keydown.meta.enter.prevent="submit()"
            @keydown.ctrl.enter.prevent="submit()"
            rows="2"
            :disabled="streaming"
            placeholder="{% trans 'Describe the change, the bug, or what to explore…' %}"
            class="chat-composer__textarea"></textarea>

  <div class="chat-composer__actions">
    <div class="chat-composer__hint">
      <kbd class="chat-composer__kbd">⌘</kbd>
      <kbd class="chat-composer__kbd">↵</kbd>
      <span>{% trans "to send" %}</span>
    </div>
    <div style="display: inline-flex; gap: 8px;">
      <button type="button" x-show="streaming" @click="stop()"
              class="chat-composer__btn chat-composer__btn--stop">{% trans "Stop" %}</button>
      <button type="submit" :disabled="streaming || !canSend()"
              class="chat-composer__btn chat-composer__btn--send">
        <span x-text="streaming ? '{% trans 'Sending…' %}' : '{% trans 'Send' %}'"></span>
        <svg x-show="!streaming" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10.22 16.78a.75.75 0 0 1-1.06-1.06l4.47-4.47H4a.75.75 0 0 1 0-1.5h9.63l-4.47-4.47a.75.75 0 1 1 1.06-1.06l5.75 5.75a.75.75 0 0 1 0 1.06l-5.75 5.75Z"/>
        </svg>
      </button>
    </div>
  </div>
</form>
