{% load icon_tags %}

<a href="{{ url }}"
   class="group rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 transition-all duration-200 hover:border-white/[0.1] hover:bg-white/[0.04]">
    <div class="mb-3 flex items-center justify-between">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl border border-white/[0.08] bg-white/[0.03]">
            {% icon icon "h-5 w-5 text-gray-500 transition-colors group-hover:text-white" %}
        </div>
        {% if badge %}
        <span class="rounded-full border border-white/[0.08] bg-white/[0.04] px-2.5 py-0.5 text-[12px] font-medium tabular-nums text-gray-400">
            {{ badge }}
        </span>
        {% endif %}
    </div>
    <h3 class="text-[15px] font-semibold text-white">{{ title }}</h3>
    <p class="mt-1 text-[14px] text-gray-500">{{ description }}</p>
</a>
