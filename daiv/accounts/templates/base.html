<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DAIV{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'accounts/css/styles.css' %}">
</head>
<body class="h-full bg-[#030712] font-sans text-white antialiased">
    {% if messages %}
    <div id="messages" class="fixed top-5 right-5 z-50 flex flex-col gap-2">
        {% for message in messages %}
        <div data-message
             class="animate-fade-up rounded-lg border px-4 py-3 text-sm shadow-lg backdrop-blur-sm
                    {% if message.tags == 'error' %}border-red-800/50 bg-red-950/80 text-red-200
                    {% elif message.tags == 'success' %}border-emerald-800/50 bg-emerald-950/80 text-emerald-200
                    {% elif message.tags == 'warning' %}border-amber-800/50 bg-amber-950/80 text-amber-200
                    {% else %}border-gray-800/50 bg-gray-900/80 text-gray-300{% endif %}"
             style="animation-delay: {{ forloop.counter0 }}00ms">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(function() {
            document.querySelectorAll('[data-message]').forEach(function(el, i) {
                setTimeout(function() {
                    el.style.transition = 'opacity 0.3s, transform 0.3s';
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(-8px)';
                    setTimeout(function() { el.remove(); }, 300);
                }, i * 100);
            });
        }, 5000);
    </script>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
