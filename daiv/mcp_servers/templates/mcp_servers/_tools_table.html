{% load i18n %}
{% if tools %}
<div class="overflow-hidden rounded-2xl border border-white/[0.06]">
    {% for t in tools %}
    <div class="border-b border-white/[0.06] px-6 py-3 last:border-b-0">
        <div class="font-mono text-sm text-white">{{ t.name }}</div>
        {% if t.description %}<div class="mt-0.5 text-sm text-gray-400">{{ t.description }}</div>{% endif %}
    </div>
    {% endfor %}
</div>
{% else %}
<div class="rounded-2xl border border-white/[0.06] bg-white/[0.02] p-6 text-center">
    <p class="text-[15px] text-gray-400">
        {% translate "No tools discovered (server unreachable or empty)." %}
    </p>
</div>
{% endif %}
